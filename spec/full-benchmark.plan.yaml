version: full-benchmark-plan-v1
execution:
  max_api_calls: 0
  subject_models: [claude-sonnet-4-6, claude-sonnet-5]
  subject_sampling:
    claude-sonnet-4-6: {temperature: 0}
    # Sonnet 5 rejects an explicit temperature=0 request. Its results must be
    # reported as a separate model/sampling condition, not a deterministic
    # replication of the Sonnet 4.6 condition.
    claude-sonnet-5: {temperature: provider_default}
  retrieval_backends:
    - tfidf
    - learned_embedding:
        provider: fastembed
        model: BAAI/bge-small-en-v1.5
        execution: local_onnx
  production_baselines: [Mem0, Zep, Letta]
  utility_oracle: task-specific-must-include-patterns-v1
gate_family:
  metrics: [precision, recall, truth_preservation]
  contradiction_pair_rail: required
scenarios:
  - {scenario_id: CB-FULL-SD-01, contamination_class: semantic_drift, paired_control: CB-FULL-SD-C01}
  - {scenario_id: CB-FULL-SD-02, contamination_class: semantic_drift, paired_control: CB-FULL-SD-C02}
  - {scenario_id: CB-FULL-SD-03, contamination_class: semantic_drift, paired_control: CB-FULL-SD-C03}
  - {scenario_id: CB-FULL-SD-04, contamination_class: semantic_drift, paired_control: CB-FULL-SD-C04}
  - {scenario_id: CB-FULL-SD-05, contamination_class: semantic_drift, paired_control: CB-FULL-SD-C05}
  - {scenario_id: CB-FULL-PV-01, contamination_class: provenance_collapse, provenance_factor: source, paired_control: CB-FULL-PV-C01}
  - {scenario_id: CB-FULL-PV-02, contamination_class: provenance_collapse, provenance_factor: age, paired_control: CB-FULL-PV-C02}
  - {scenario_id: CB-FULL-PV-03, contamination_class: provenance_collapse, provenance_factor: domain, paired_control: CB-FULL-PV-C03}
