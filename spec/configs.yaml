# CONTAM-Bench memory design configurations — frozen v0.2 + next-run additions
#
# Frozen v0.2 has seven configurations: naive, governed, and five
# single-control ablation arms. The experimental guarded-gate arm below is
# intentionally excluded from frozen evidence and must be evaluated in a new
# repeated-run release.
#
# Rationale for numeric thresholds (IPC-style discipline — no numbers without
# recorded rationale):
# - retrieval.k = 4: small enough that a relevance gate has signal to add on
#   an 8-scenario corpus whose stores hold 2-5 memories; large enough that
#   distractor memories can surface in the naive config. With stores this
#   small, k=4 makes naive retrieval effectively "return everything ranked",
#   which is the worst-case design we want naive to represent.
# - ttl_days by fact class (governed and arm_ttl):
#     stable: 365    — identity-level facts (preferences, skills) change on
#                      a yearly-ish cadence; the validation corpus max age
#                      is 200 days, so stable facts never expire here.
#     volatile: 90   — life-context facts (location, job, project) go stale
#                      in months; chosen so the 200-day-old "lives in
#                      Porto" seed in CB-VAL-004 expires while the
#                      10-day-old "relocated to Denver" seed survives.
#     ephemeral: 14  — session-level facts (current task, one-off requests)
#                      are meaningless after two weeks.
#   These are design choices under test, not empirical constants.
#   default_fact_class = stable is conservative for RECALL (never silently
#   drop an unclassified memory) and anti-conservative for STALENESS; the
#   axis is named explicitly per external review.
# - temperature = 0 on the subject: determinism first — artifacts must be
#   reproducible from spec + config hash. This forces the subject model
#   choice below (Sonnet 5 rejects non-default sampling parameters).

models:
  # Subject: model under test. Sonnet-class per CLAUDE.md Phase 2.
  # claude-sonnet-4-6 (not claude-sonnet-5) because the harness requires
  # temperature=0 and Sonnet 5 returns 400 on non-default sampling params.
  # Verified against Anthropic docs, 2026-07-06.
  subject: claude-sonnet-4-6
  subject_temperature: 0
  subject_max_tokens: 1024      # probes are short conversational queries

  # Judge: scores subject output. Haiku-class per CLAUDE.md Phase 3.
  # MUST differ from subject (never let a model judge its own output).
  judge: claude-haiku-4-5
  judge_temperature: 0
  judge_max_tokens: 512

  # Relevance gate = judge-class model, never the subject (CLAUDE.md Phase 0).
  gate: claude-haiku-4-5
  gate_temperature: 0
  gate_max_tokens: 128

  # Embeddings substitution (CLAUDE.md constraint 6): the Anthropic API
  # exposes no embeddings endpoint, so retrieval similarity uses TF-IDF
  # cosine similarity via scikit-learn. Documented substitution.
  similarity: tfidf-cosine (scikit-learn TfidfVectorizer)

configs:
  naive:
    scope: global               # one undifferentiated store; no domain filter
    fidelity: summarized        # store the hand-authored summary of each memory
    retrieval:
      method: similarity_top_k
      k: 4
      relevance_gate: false
    provenance: untagged        # memory block omits source (user/assistant/tool)
    decay: none                 # nothing ever expires

  governed:
    scope: namespaced           # retrieval filtered to the probe's domain
    fidelity: raw               # store memory content verbatim
    retrieval:
      method: similarity_top_k
      k: 4
      relevance_gate: true      # gate model classifies RELEVANT | IRRELEVANT
    provenance: tagged          # memory block carries [source: ...] tags
    decay:
      method: ttl_by_fact_class
      ttl_days:
        stable: 365
        volatile: 90
        ephemeral: 14
      # memories with no fact_class are treated as `stable` (conservative
      # for recall, anti-conservative for staleness — axis named on purpose)
      default_fact_class: stable

  # --------------------------------------------------------------------
  # Ablation arms (v0.2): each arm = naive + exactly ONE control changed.
  # Purpose: attribute contamination reduction to individual controls
  # instead of the bundled governed treatment.
  # --------------------------------------------------------------------

  arm_namespace:
    # Isolates: scope. Expected effect: scope_bleed, semantic_drift
    # (retrieval layer).
    scope: namespaced           # <- the one change vs naive
    fidelity: summarized
    retrieval:
      method: similarity_top_k
      k: 4
      relevance_gate: false
    provenance: untagged
    decay: none

  arm_provenance:
    # Isolates: provenance tags. Expected effect: provenance_collapse,
    # seeded recursion (CB-VAL-009).
    scope: global
    fidelity: summarized
    retrieval:
      method: similarity_top_k
      k: 4
      relevance_gate: false
    provenance: tagged          # <- the one change vs naive
    decay: none

  arm_ttl:
    # Isolates: decay. Expected effect: temporal_staleness.
    scope: global
    fidelity: summarized
    retrieval:
      method: similarity_top_k
      k: 4
      relevance_gate: false
    provenance: untagged
    decay:                      # <- the one change vs naive
      method: ttl_by_fact_class
      ttl_days:
        stable: 365
        volatile: 90
        ephemeral: 14
      default_fact_class: stable

  arm_gate:
    # Isolates: relevance gate. Expected effect: residual semantic_drift;
    # watch recall cost on CB-VAL-004 / CB-VAL-007 (the only probabilistic
    # control, and the one that produced a false negative in v0.1.1).
    scope: global
    fidelity: summarized
    retrieval:
      method: similarity_top_k
      k: 4
      relevance_gate: true      # <- the one change vs naive
    provenance: untagged
    decay: none

  arm_gate_preserve_pairs:
    # Next-run experimental arm: arm_gate plus the contradiction-preservation
    # rail. It is not a v0.2 result and must be reported separately.
    scope: global
    fidelity: summarized
    retrieval:
      method: similarity_top_k
      k: 4
      relevance_gate: true
      contradiction_policy: preserve_pairs
    provenance: untagged
    decay: none

  arm_raw:
    # Isolates: storage fidelity. Expected effect: summarization_loss.
    scope: global
    fidelity: raw               # <- the one change vs naive
    retrieval:
      method: similarity_top_k
      k: 4
      relevance_gate: false
    provenance: untagged
    decay: none
