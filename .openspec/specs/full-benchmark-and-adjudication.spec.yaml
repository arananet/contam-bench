    - "scenarios/gate-family/"
  metrics:
    - "contamination_rate"
    - "personalization_retention"
    - "utility_oracle_pass_rate"
    - "gate_precision"
    - "gate_recall"
    - "truth_preservation"
    - "cost_estimate"

technical_notes: |
  The initial implementation is deterministic tooling and declarative specs;
  test fixtures must not call external APIs. Human submissions are append-only
  JSON layers validated against the immutable review queue. The final run
  command defaults to dry-run and requires an explicit --authorize-api flag
  plus a matching documented budget to contact a model provider.

