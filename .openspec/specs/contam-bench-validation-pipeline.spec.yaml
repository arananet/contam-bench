technical_notes: |
  Constraints from CLAUDE.md: plain Python + Anthropic SDK, no agent
  frameworks; deterministic scoring before LLM judge; temperature 0;
  every numeric threshold (k=4, TTLs) must record its rationale in spec/.
  Subject model is sonnet-class; judge and relevance gate are haiku-class.
  Progress log:
  - phase-0: spec/ files + OPEN_QUESTIONS.md committed
  - phase-1: 8 scenarios committed, all schema-validated
  - phase-2: src/llm.py, src/memory_store.py, src/retrieval.py,
    src/harness.py + unit tests (store, retrieval, schema)
  - phase-3: src/judge.py (deterministic-first, judge fallback,
    disagreements flagged needs_human_review) + unit tests
  - phase-4: src/metrics.py + report generator; metrics unit tests and
    mocked end-to-end integration test (16 artifacts, report, call count)

